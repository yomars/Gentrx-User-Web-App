# =============================================================================
# Gentrx — Block Storage Static File Serving
# Drop this file into: /etc/nginx/conf.d/gentrx-storage.conf
#
# After copying:
#   nginx -t && systemctl reload nginx
#
# This config serves /storage/* requests directly from block storage at
# /mnt/gentrx/uploads/ — no PHP involved for public assets.
# Patient files are BLOCKED here; they route through the Laravel app.
# =============================================================================

# ---------------------------------------------------------------------------
# PUBLIC: Doctor profile images and signatures
# Served directly by Nginx — no auth required
# Cache: 30 days (filenames include UUID so cache-busting is safe)
# ---------------------------------------------------------------------------
location ^~ /storage/doctors/ {
    alias /mnt/gentrx/uploads/doctors/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

# ---------------------------------------------------------------------------
# PUBLIC: Client / user profile images
# ---------------------------------------------------------------------------
location ^~ /storage/clients/ {
    alias /mnt/gentrx/uploads/clients/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

# ---------------------------------------------------------------------------
# PUBLIC: System assets (departments, specializations, clinic images)
# ---------------------------------------------------------------------------
location ^~ /storage/system/ {
    alias /mnt/gentrx/uploads/system/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

# ---------------------------------------------------------------------------
# PRIVATE: Patient files — NEVER serve directly
# Access MUST go through the Laravel app (signed URL / auth check)
# ---------------------------------------------------------------------------
location ^~ /storage/patients/ {
    deny all;
    return 403 "Access denied.";
}

# ---------------------------------------------------------------------------
# BLOCKED: Quarantine and tmp directories
# These must never be publicly accessible under any circumstance
# ---------------------------------------------------------------------------
location ^~ /storage/tmp/ {
    deny all;
    return 403;
}

location ^~ /storage/quarantine/ {
    deny all;
    return 403;
}

# ---------------------------------------------------------------------------
# LEGACY FALLBACK: Old Laravel storage/app/public files
# Serves existing files from the original Laravel storage symlink path.
# Remove this block once all legacy files are migrated to block storage.
# ---------------------------------------------------------------------------
location ^~ /storage/users/ {
    alias /opt/gentrx-api/storage/app/public/users/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

location ^~ /storage/clinics/ {
    alias /opt/gentrx-api/storage/app/public/clinics/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

location ^~ /storage/department/ {
    alias /opt/gentrx-api/storage/app/public/department/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

location ^~ /storage/specialization/ {
    alias /opt/gentrx-api/storage/app/public/specialization/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}

location ^~ /storage/doctors/signatures/ {
    alias /opt/gentrx-api/storage/app/public/doctors/signatures/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    try_files $uri =404;
}
