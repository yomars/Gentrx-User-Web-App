name: Contract Baseline Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      openapi_tag:
        description: Optional override tag for manual checks
        required: false
      api_version:
        description: Optional override API version for manual checks
        required: false
      migration_version:
        description: Optional override migration version for manual checks
        required: false

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify baseline file exists
        run: test -f contract-baseline.json

      - name: Clinic flow contract sync
        run: |
          CONTRACT=manifests/contracts/clinic-flow.contract.json
          if [ ! -f "$CONTRACT" ]; then
            echo "::error::$CONTRACT is missing. Copy from yomars/API-GENTRX-PH manifests/contracts/clinic-flow.contract.json"
            exit 1
          fi
          check_field() {
            actual=$(jq -r ".$1" "$CONTRACT")
            if [ "$actual" != "$2" ]; then
              echo "::error::$CONTRACT.$1 expected '$2' but got '$actual'"
              exit 1
            fi
          }
          check_field "clinic_resolution_policy.applicability" "patient_and_guest_patient_facing_apps_only_excludes_admin_and_doc_apps"
          check_field "clinic_resolution_policy.location_enabled" "nearest_clinic_by_lat_lng"
          check_field "clinic_resolution_policy.location_disabled_or_unavailable" "patient_profile_clinic"
          check_field "clinic_resolution_policy.doctor_filtering" "filter_doctors_by_resolved_clinic"
          check_field "clinic_resolution_policy.guest_behavior" "location_if_available_else_single_global_default_clinic"
          check_field "wallet_owner_mapping.patient" "owner_id = patients.patient_code"
          check_field "wallet_owner_mapping.doctor" "owner_id = doctors.user_id"
          check_field "wallet_owner_mapping.user" "owner_id = users.id"
          echo "Clinic flow contract sync validated"

      - name: Parse baseline
        id: baseline
        run: |
          OPENAPI_TAG=$(jq -r '.openapi_tag' contract-baseline.json)
          API_VERSION=$(jq -r '.api_version' contract-baseline.json)
          MIGRATION_VERSION=$(jq -r '.migration_version' contract-baseline.json)
          {
            echo "openapi_tag=$OPENAPI_TAG"
            echo "api_version=$API_VERSION"
            echo "migration_version=$MIGRATION_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Enforce client version pin (blocking)
        run: |
          TAG='${{ github.event.inputs.openapi_tag || steps.baseline.outputs.openapi_tag }}'
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::openapi_tag is missing in contract-baseline.json and workflow input"
            exit 1
          fi

          if grep -R -s "$TAG" package.json package-lock.json pubspec.yaml pubspec.lock >/dev/null 2>&1; then
            echo "Client tag pin found: $TAG"
          else
            echo "::error::Client tag pin missing: $TAG"
            exit 1
          fi