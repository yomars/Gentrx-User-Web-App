name: Contract Baseline Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      openapi_tag:
        description: Optional override tag for manual checks
        required: false
      api_version:
        description: Optional override API version for manual checks
        required: false
      migration_version:
        description: Optional override migration version for manual checks
        required: false

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify baseline file exists
        run: test -f contract-baseline.json

      - name: Parse baseline
        id: baseline
        run: |
          OPENAPI_TAG=$(jq -r '.openapi_tag' contract-baseline.json)
          API_VERSION=$(jq -r '.api_version' contract-baseline.json)
          MIGRATION_VERSION=$(jq -r '.migration_version' contract-baseline.json)
          WARN_UNTIL=$(jq -r '.warn_mode_until_release' contract-baseline.json)

          {
            echo "openapi_tag=$OPENAPI_TAG"
            echo "api_version=$API_VERSION"
            echo "migration_version=$MIGRATION_VERSION"
            echo "warn_until=$WARN_UNTIL"
          } >> "$GITHUB_OUTPUT"

      - name: Check client version pin
        run: |
          TAG='${{ github.event.inputs.openapi_tag || steps.baseline.outputs.openapi_tag }}'
          if grep -R "$TAG" package.json package-lock.json >/dev/null 2>&1; then
            echo "Client tag pin found: $TAG"
          else
            echo "Client tag pin missing: $TAG"
            echo "warning=1" >> $GITHUB_ENV
          fi

      - name: Enforce warn-to-block mode
        run: |
          normalize_release() {
            if echo "$1" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$'; then
              echo "$1" | tr -d '.'
            else
              echo ""
            fi
          }

          CURRENT_RELEASE='${{ github.event.inputs.migration_version || steps.baseline.outputs.migration_version }}'
          WARN_UNTIL='${{ steps.baseline.outputs.warn_until }}'

          if [ -z "$CURRENT_RELEASE" ]; then
            CURRENT_RELEASE="$(date -u +%Y.%m.%d).01"
          fi

          CURRENT_NUM="$(normalize_release "$CURRENT_RELEASE")"
          WARN_UNTIL_NUM="$(normalize_release "$WARN_UNTIL")"

          if [ "${warning:-0}" != "1" ]; then
            echo "No contract baseline drift detected"
            exit 0
          fi

          if [ -z "$WARN_UNTIL_NUM" ]; then
            echo "::error::warn_mode_until_release is missing or invalid in contract-baseline.json"
            exit 1
          fi

          if [ -z "$CURRENT_NUM" ]; then
            echo "::error::Current release value is invalid: $CURRENT_RELEASE"
            exit 1
          fi

          if [ "$CURRENT_NUM" -le "$WARN_UNTIL_NUM" ]; then
            echo "::warning::Contract baseline drift detected. Warn mode active through release $WARN_UNTIL (current: $CURRENT_RELEASE)"
          else
            echo "::error::Contract baseline drift detected after warn window (warn_until=$WARN_UNTIL, current=$CURRENT_RELEASE)"
            exit 1
          fi
