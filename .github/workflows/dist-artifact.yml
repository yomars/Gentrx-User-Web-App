name: Build Dist Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    env:
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend preflight
        run: npm run preflight:frontend

      - name: Build
        run: npm run build

      - name: Package dist bundle
        run: npm run package:dist

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: gentrx-user-web-dist
          path: artifacts/*.tar.gz
          if-no-files-found: error

      - name: Upload dist metadata files
        uses: actions/upload-artifact@v4
        with:
          name: gentrx-user-web-version-metadata
          path: |
            dist/version.json
            dist/version-live.json
          if-no-files-found: error
