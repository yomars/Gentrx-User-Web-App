name: Vercel Release Gate

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment target"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      dry_run_only:
        description: "Run preflight/build only (no deploy)"
        required: true
        type: boolean
        default: true

jobs:
  preflight-and-build:
    runs-on: ubuntu-latest
    env:
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend preflight
        run: npm run preflight:frontend

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  deploy-preview:
    if: ${{ github.event.inputs.dry_run_only == 'false' && github.event.inputs.target_environment == 'preview' }}
    needs: preflight-and-build
    runs-on: ubuntu-latest
    environment: preview
    outputs:
      preview_url: ${{ steps.preview_deploy.outputs.preview_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend preflight
        run: npm run preflight:frontend

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Preview
        id: preview_deploy
        run: |
          npx vercel@latest pull --yes --environment=preview --token "$VERCEL_TOKEN"
          npx vercel@latest build --token "$VERCEL_TOKEN"
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN")
          echo "Preview deployment URL: $DEPLOY_URL"
          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

  deploy-production:
    if: ${{ github.event.inputs.dry_run_only == 'false' && github.event.inputs.target_environment == 'production' }}
    needs: preflight-and-build
    runs-on: ubuntu-latest
    environment: production
    outputs:
      production_url: ${{ steps.production_deploy.outputs.production_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend preflight
        run: npm run preflight:frontend

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Production
        id: production_deploy
        run: |
          npx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel@latest build --prod --token "$VERCEL_TOKEN"
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "Production deployment URL: $DEPLOY_URL"
          echo "production_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

  smoke-check:
    if: >-
      ${{ always() &&
          github.event.inputs.dry_run_only == 'false' &&
          ((github.event.inputs.target_environment == 'preview' && needs.deploy-preview.result == 'success') ||
           (github.event.inputs.target_environment == 'production' && needs.deploy-production.result == 'success')) }}
    needs:
      - deploy-preview
      - deploy-production
    runs-on: ubuntu-latest
    env:
      SMOKE_TARGET_ENV: ${{ github.event.inputs.target_environment }}
      SMOKE_TARGET_URL: ${{ github.event.inputs.target_environment == 'production' && secrets.VITE_API_ADDRESS || needs.deploy-preview.outputs.preview_url }}
      API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
      SMOKE_TIMEOUT_MS: "20000"
      EXPECTED_GIT_SHA: ${{ github.sha }}
      EXPECTED_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm run smoke:deploy

      - name: Verify deployed Git SHA
        run: npm run verify:deploy-sync

  rollback-on-failure:
    # Runs only when: production was successfully deployed AND smoke check failed.
    # Guard with always() so the job is not skipped by the upstream failure.
    if: >-
      ${{ always() &&
          needs.deploy-production.result == 'success' &&
          needs.smoke-check.result == 'failure' }}
    needs:
      - deploy-production
      - smoke-check
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      ROLLBACK_SKIP_CONFIRM: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rollback production to last stable deployment
        run: npm run rollback:vercel
