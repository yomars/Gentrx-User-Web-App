name: Migration Preflight

on:
  workflow_dispatch:
    inputs:
      run_db_apply:
        description: "Run DB apply step (requires SCHEMA_PATCH_FILE and DB secrets)"
        required: true
        default: false
        type: boolean

jobs:
  preflight-and-dry-run:
    runs-on: ubuntu-latest
    env:
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

      DEST_DATABASE_URL: ${{ secrets.DEST_DATABASE_URL }}
      DEST_DB_HOST: ${{ secrets.DEST_DB_HOST }}
      DEST_DB_PORT: ${{ secrets.DEST_DB_PORT }}
      DEST_DB_USER: ${{ secrets.DEST_DB_USER }}
      DEST_DB_PASSWORD: ${{ secrets.DEST_DB_PASSWORD }}
      DEST_DB_NAME: ${{ secrets.DEST_DB_NAME }}
      DEST_DB_SCHEMA: ${{ secrets.DEST_DB_SCHEMA }}
      DEST_DB_SSL: ${{ secrets.DEST_DB_SSL }}
      SCHEMA_PATCH_FILE: ${{ secrets.SCHEMA_PATCH_FILE }}
      ALLOW_NON_VULTR_PG: ${{ secrets.ALLOW_NON_VULTR_PG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight env validation
        run: npm run preflight:env

      - name: DB schema dry-run
        run: npm run db:schema:dry-run

  db-apply:
    if: ${{ github.event.inputs.run_db_apply == 'true' }}
    needs: preflight-and-dry-run
    runs-on: ubuntu-latest
    environment: production
    env:
      DEST_DATABASE_URL: ${{ secrets.DEST_DATABASE_URL }}
      DEST_DB_HOST: ${{ secrets.DEST_DB_HOST }}
      DEST_DB_PORT: ${{ secrets.DEST_DB_PORT }}
      DEST_DB_USER: ${{ secrets.DEST_DB_USER }}
      DEST_DB_PASSWORD: ${{ secrets.DEST_DB_PASSWORD }}
      DEST_DB_NAME: ${{ secrets.DEST_DB_NAME }}
      DEST_DB_SCHEMA: ${{ secrets.DEST_DB_SCHEMA }}
      DEST_DB_SSL: ${{ secrets.DEST_DB_SSL }}
      SCHEMA_PATCH_FILE: ${{ secrets.SCHEMA_PATCH_FILE }}
      ALLOW_NON_VULTR_PG: ${{ secrets.ALLOW_NON_VULTR_PG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight DB env validation
        run: npm run preflight:db

      - name: Apply DB patch
        run: npm run db:schema:apply
