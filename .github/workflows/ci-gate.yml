name: CI Gate

# Runs on every pull request targeting main.
# This workflow is registered as the required status check in GitHub branch
# protection rules (see scripts/ci/configure_branch_protection.mjs).
# A PR cannot be merged until this check passes.

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    env:
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_FCM_PUBLIC_KEY: ${{ secrets.VITE_FIREBASE_FCM_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend env preflight
        run: npm run preflight:frontend

      - name: Build
        run: npm run build

  lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changed JS/JSX files
        shell: bash
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          CHANGED_FILES=$(git diff --name-only "$BASE_REF"...HEAD -- '*.js' '*.jsx')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No JS/JSX files changed; skipping lint step."
            exit 0
          fi

          echo "Linting changed files:"
          echo "$CHANGED_FILES"
          npx eslint $CHANGED_FILES --max-warnings 0
